name: snake & skyline

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 生成贪吃蛇（秒运行）
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: GGB00M3
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 生成 3D 天空线（轻量、不卡死）
      - name: Generate 3D Skyline
        run: |
          mkdir -p dist
          curl -s "https://skyline.github.com/svg/GGB00M3/2025" -o dist/skyline.svg

      # 提交到 output 分支（不会清空、不会404）
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          keep_files: true
